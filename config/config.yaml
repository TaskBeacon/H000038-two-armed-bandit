# ============================================================================
# Browser companion config
# - Used by: psyflow-web shared runner
# - Scope: browser preview only
# ============================================================================

# === Subject Form ===========================================================
subinfo_fields:
  - name: subject_id
    type: int
    constraints:
      min: 101
      max: 999
      digits: 3

subinfo_mapping:
  subject_id: 被试编号（3位）
  Participant Information: 被试信息
  registration_failed: 注册失败
  registration_successful: 注册成功
  invalid_input: '{field} 输入无效'


# === Display / Window =======================================================
window:
  size: [1280, 720]
  units: pix
  screen: 0
  bg_color: black
  fullscreen: false
  monitor_width_cm: 35.5
  monitor_distance_cm: 60


# === Task ==================================================================
task:
  task_name: two_armed_bandit
  save_path: ./outputs/html
  language: Chinese
  voice_name: zh-CN-YunyangNeural
  voice_enabled: false
  total_blocks: 4
  total_trials: 160
  trial_per_block: 40
  conditions:
    - bandit
  condition_weights: null
  key_list: [f, j, space]
  left_key: f
  right_key: j
  reward_win: 10
  reward_loss: 0
  delta: 10
  seed_mode: same_across_sub
  initial_score: 1000


# === Timing =================================================================
timing:
  pre_choice_fixation_duration: 0.5
  bandit_choice_duration: 2.5
  choice_confirmation_duration: 0.4
  outcome_feedback_duration: 0.8
  iti_duration: 0.6


# === Stimuli ================================================================
stimuli:
  fixation:
    type: text
    font: SimHei
    text: "+"
    color: white
    height: 44

  instruction_text:
    type: text
    font: SimHei
    text: |
      双臂老虎机学习任务

      每一试次请在左右两台机器中选择一台。

      按 F 选左侧，按 J 选右侧。

      系统会给出中奖或未中奖反馈，请持续学习更优选项。

      按空格键开始。
    color: white
    height: 30
    wrapWidth: 980

  machine_left:
    type: rect
    width: 240
    height: 300
    pos: [-230, 20]
    lineColor: white
    lineWidth: 3
    fillColor: [0.1, 0.1, 0.1]

  machine_right:
    type: rect
    width: 240
    height: 300
    pos: [230, 20]
    lineColor: white
    lineWidth: 3
    fillColor: [0.1, 0.1, 0.1]

  machine_left_label:
    type: text
    font: SimHei
    text: 左侧机器
    color: white
    height: 36
    pos: [-230, 20]

  machine_right_label:
    type: text
    font: SimHei
    text: 右侧机器
    color: white
    height: 36
    pos: [230, 20]

  highlight_left:
    type: rect
    width: 270
    height: 330
    pos: [-230, 20]
    lineColor: yellow
    lineWidth: 5
    fillColor: null

  highlight_right:
    type: rect
    width: 270
    height: 330
    pos: [230, 20]
    lineColor: yellow
    lineWidth: 5
    fillColor: null

  choice_prompt:
    type: text
    font: SimHei
    text: |
      请选择一台机器

      请在 {deadline_s} 秒内作答
    color: white
    height: 30
    pos: [0, -210]
    wrapWidth: 980

  target_prompt:
    type: text
    font: SimHei
    text: 你选择了：{choice_label}
    color: cyan
    height: 36
    pos: [0, 210]
    wrapWidth: 980

  outcome_text:
    type: text
    font: SimHei
    text: |
      掷骰结果：{roll}
      所选方案：{choice_label}
    color: white
    height: 42
    pos: [0, 40]
    wrapWidth: 980

  feedback_win:
    type: text
    font: SimHei
    text: |
      中奖！ +{reward_delta} 分

      当前总分：{total_score}
    color: green
    height: 38
    wrapWidth: 980

  feedback_loss:
    type: text
    font: SimHei
    text: |
      未中奖 +{reward_delta} 分

      当前总分：{total_score}
    color: orange
    height: 38
    wrapWidth: 980

  block_break:
    type: text
    font: SimHei
    text: |
      区块 {block_num}/{total_blocks}

      记录率：{accuracy:.2%}

      当前分数：{total_score}

      按空格键继续
    color: white
    height: 24
    wrapWidth: 980

  good_bye:
    type: text
    font: SimHei
    text: |
      任务结束，最终分数：{total_score}

      按空格键退出
    color: white
    height: 30
    wrapWidth: 980


# === Triggers ===============================================================
triggers:
  map:
    exp_onset: 1
    exp_end: 2
    block_onset: 10
    block_end: 11
    pre_choice_fixation_onset: 20
    bandit_choice_onset: 30
    bandit_choice_left_press: 31
    bandit_choice_right_press: 32
    bandit_choice_no_response: 33
    bandit_choice_forced: 34
    choice_confirmation_onset: 40
    outcome_feedback_win_onset: 50
    outcome_feedback_loss_onset: 51
    iti_onset: 60
  policy:
    strict: false


# === Condition Generation ===================================================
condition_generation:
  block_probabilities:
    - left: 0.75
      right: 0.25
    - left: 0.25
      right: 0.75
    - left: 0.65
      right: 0.35
    - left: 0.35
      right: 0.65
  no_choice_policy: random
  randomize_within_block: false
  enable_logging: true
